name: Build & release plugin ZIP

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build auth_cubite.zip
        run: |
          cd auth
          zip -r ../auth_cubite.zip cubite -x "*.DS_Store" "*/.git/*"
          cd ..
          unzip -l auth_cubite.zip | head -40

      - name: Verify version.php matches the tag
        run: |
          TAG="${GITHUB_REF##refs/tags/}"
          # Strip the leading "v" from the tag (e.g. v1.3.4 -> 1.3.4)
          TAG_VERSION="${TAG#v}"
          PLUGIN_VERSION=$(grep -oP "release\s*=\s*'\K[0-9.]+" auth/cubite/version.php || true)
          echo "Tag: $TAG_VERSION   Plugin release: $PLUGIN_VERSION"
          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "::warning::Tag $TAG_VERSION does not match version.php release $PLUGIN_VERSION"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: auth_cubite.zip
          generate_release_notes: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
